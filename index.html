<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found | ISBN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .urdu-font { font-family: 'Noto Nastaliq Urdu', serif !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center space-y-6">
        <div class="text-9xl font-black text-[#000080] tracking-tighter">404</div>
        <h1 class="text-3xl font-bold">Page Not Found</h1>
        <p class="text-slate-600 max-w-md">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable in this broadcast sector.
        </p>
        <div class="pt-8">
            <a href="/" class="bg-[#000080] text-white px-8 py-3 rounded-full font-bold hover:bg-blue-900 transition-colors">
                Return to Network
            </a>
        </div>
    </div>

    <footer class="absolute bottom-0 w-full text-center py-6 text-[10px] text-slate-400 font-mono">
        © 2026 Indian Subcontinent Broadcasting Network (ISBN) | Error Code: SIG-404
    </footer>

</body>
</html>
